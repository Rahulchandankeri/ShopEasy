<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Welcome to EasyShop, Shop products faster, easier. Get delivered in 90minutes">
    <meta name="author" content="Rahul Chandankeri">
    <meta name="keywords" content="Shopping,upto 90% off,mobiles,laptops,online shopping,">
    <title>EasyShop | Online Shopping</title>
    <link href='https://fonts.googleapis.com/css?family=Overpass' rel='stylesheet'>
    <link type="text/css" rel="stylesheet prefetch" referrerpolicy="strict-origin" href="style.css">
    <link type="text/css" rel="stylesheet prefetch" referrerpolicy="strict-origin" href="max.css">
</head>
<body>
    <div class="topnavigator">
        <img class="logo" src="assets/static/ShopEasy.png">
        <input type="search" class="search" placeholder="Search for products, brands..." title="Search for products, brands">
        <div class="rtside">
            <i style="float: right; margin: 10px; color: #FFFFFF; font-size: x-large;" class="fas fa-sign-out-alt"><span class="login">Log In</span></i>
            <i style="float: right; margin: 10px; color: #FFFFFF; font-size: x-large;" class="fas fa-shopping-cart"><span class="cart">Cart</span></i>

        </div>
    </div>

    <div class="slide">
        <img src="assets/dynamic/banner2.png" style="
        align-content: center;
        margin: auto;
        width: 2560px;
        max-width: 100%;
        /* height: 289px; */
    ">

    </div>
    <div class="productcontainer">
        <div class="product">
            <div class="productholder">
                <div class="quickview"> 
                    <img class="product1" src="assets/dynamic/brushes.png">
                    <div class="quickviewcontent">
                        <p>Quick View</p>
                    </div>
                </div><span class="productname">Wooden Toothbrush (Pack of 3)</span>
                <span class="productprice">₹149</span>
            </div> 
        </div>
        <div class="product">
            <div class="productholder">
                <div class="quickview"> 
                    <img class="product1" src="assets/dynamic/bodyoil.png">
                    <div class="quickviewcontent">
                        <p>Quick View</p>
                    </div>
                </div><span class="productname">Cocooil Organic Oil (200ml)</span>
                <span class="productprice">₹449</span>
            </div> 
        </div>
        <div class="product">
            <div class="productholder">
                <div class="quickview"> 
                    <img class="product1" src="assets/dynamic/soap.png">
                    <div class="quickviewcontent">
                        <p>Quick View</p>
                    </div>
                </div><span class="productname">Dille & Kamille Soap (pack of 1)</span>
                <span class="productprice">₹99</span>
            </div> 
        </div>
   
        

    </div>
    <div class="offer">
        <img style="position: relative; width: 100%; max-width: 600px; margin: 20px; "  src="assets/dynamic/discount.png">
        <img style="position: relative;  width: 100%; max-width: 600px;  margin: 20px; " src="assets/dynamic/launch.png">

    </div>
    <div class="productcontainer other">
        <div class="product">
            <div class="productholder">
                <div class="quickview"> 
                    <img class="product1" src="assets/dynamic/handsantizer.png">
                    <div class="quickviewcontent">
                        <p>Quick View</p>
                    </div>
                </div>
                <span class="productname">Hand Cleansing Gel</span>
                <span class="productprice">₹79</span>
            </div> 
        </div>
        

        <div class="product">
            <div class="productholder">
                <div class="quickview"> 
                    <img class="product1" src="assets/dynamic/bamboshampoo.png">
                    <div class="quickviewcontent">
                        <p>Quick View</p>
                    </div>
                </div><span class="productname">Hand Cleansing Gel</span>
                <span class="productprice">₹79</span>
            </div> 
        </div>
       
        <div class="product">
            <div class="productholder">
                <div class="quickview"> 
                    <img class="product1" src="assets/dynamic/perfume.png">
                    <div class="quickviewcontent">
                        <p>Quick View</p>
                    </div>
                </div><span class="productname">Hand Cleansing Gel</span>
                <span class="productprice">₹79</span>
            </div> 
        </div>
        </div>

    </div>
    <div class="footer">

    </div>
    
   
    <script src="https://kit.fontawesome.com/424ece3e72.js" crossorigin="anonymous"></script>
</body>
</html>
